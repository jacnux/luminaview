#version: '3.8'

services:
  # --- BASE DE DONNÉES (PARTAGÉE) ---
  mongo:
    image: mongo:4.4
    container_name: luminaview-db
    expose:
      - "27017"
    volumes:
      - ./data/mongo:/data/db
    restart: always
    networks:
      - lumina-network

  # --- BACKEND API (Luminaview) ---
  backend:
    build: ./backend
    container_name: luminaview-app
    expose:
      - "3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=${MONGO_URI}
      - NODE_ENV=${NODE_ENV}
      - CLIENT_URL=${PUBLIC_URL}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - JWT_SECRET=${JWT_SECRET}
    user: "1000:1000"
    volumes:
      - ./backend/src:/app/src
      - ./data/uploads:/app/uploads
    command: npm run dev
    restart: always
    networks:
      - lumina-network

  # --- FRONTEND REACT (Luminaview) ---
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
    container_name: luminaview-ui
    expose:
      - "80"
    depends_on:
      - backend
    restart: always
    networks:
      - lumina-network

  # --- MAILHOG ---
  mailhog:
    image: mailhog/mailhog
    container_name: luminaview-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - lumina-network

  # --- NGINX PROXY (Luminaview) ---
  nginx-proxy:
    image: nginx:alpine
    container_name: luminaview-nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - lumina-network

  # ==========================================
  # --- NOUVEAU : BLOG ENGINE ---
  # ==========================================

  blog-backend:
    build: ./blog-backend
    container_name: helioscope-blog-app
    expose:
      - "3001"
    restart: always  # <--- AJOUTER CECI
    environment:
      # On se connecte au même Mongo, mais on change le nom de la DB
      - MONGO_URI=mongodb://mongo:27017/helioscope_blogs
      - MAIN_MONGO_URI=mongodb://mongo:27017/luminaview
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
       # --- AJOUTER LES VARIABLES SMTP ---
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      - mongo
    volumes:
      - ./blog-backend/src:/app/src
    networks:
      - lumina-network

  blog-frontend:
    build: ./blog-frontend
    container_name: helioscope-blog-ui
    restart: always
    ports:
      - "8080:80"
    environment:
      # L'API du blog est sur le réseau interne
      - REACT_APP_API_URL=http://blog-backend:3001
    depends_on:
      - blog-backend
    networks:
      - lumina-network

networks:
  lumina-network:
    driver: bridge
